server:
  port: ${API_PORT:8080}

spring:
  application:
    name: recruiting-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:recruiting}}
    username: ${POSTGRES_USER:recruiting}
    password: ${POSTGRES_PASSWORD:recruiting}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  mvc:
    problemdetails:
      enabled: true

springdoc:
  swagger-ui:
    path: /docs

recruiting:
  security:
    jwt-secret: ${JWT_SECRET:change-this-development-secret}
