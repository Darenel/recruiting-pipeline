services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-recruiting}
      POSTGRES_USER: ${POSTGRES_USER:-recruiting}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-recruiting}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-recruiting} -d ${POSTGRES_DB:-recruiting}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: ./api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      API_PORT: 8080
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-recruiting}
      POSTGRES_USER: ${POSTGRES_USER:-recruiting}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-recruiting}
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-recruiting}
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8081}:80"
    depends_on:
      - api

volumes:
  postgres-data:
