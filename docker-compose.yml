services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-recruiting}
      POSTGRES_USER: ${POSTGRES_USER:-recruiting}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-recruiting}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-recruiting} -d ${POSTGRES_DB:-recruiting}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
